services:
  - type: web
    name: meridian-health
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm ci && npx prisma generate && npx prisma db push --skip-generate && npx next build
    startCommand: npx next start --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.14.0"
      - key: DATABASE_URL
        value: file:./prod.db
      - key: ADMIN_PASSWORD
        value: Demo@12345
      - key: ADMIN_SECRET
        value: meridian-health-prod-secret-change-me-32chars-min
      - key: NEXT_PUBLIC_CLINIC_NAME
        value: Meridian Health
      - key: NEXT_PUBLIC_DOCTOR_NAME
        value: Dr. Anika Rao
