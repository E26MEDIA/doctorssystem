services:
  - type: web
    name: meridian-health
    runtime: node
    plan: free
    region: oregon
    branch: cursor/client-demo-hosting-437b
    autoDeploy: true
    # --include=dev is required: NODE_ENV=production would skip Tailwind/TypeScript and break next build
    buildCommand: npm ci --include=dev && npx prisma generate && npx prisma db push --skip-generate && npx next build
    startCommand: npx next start --hostname 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.14.0"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        value: file:./prod.db
      - key: ADMIN_PASSWORD
        value: Demo@12345
      - key: ADMIN_SECRET
        value: meridian-health-prod-secret-xk9m2p7q4w8n5r1t6y3u0v2b
      - key: NEXT_PUBLIC_CLINIC_NAME
        value: Meridian Health
      - key: NEXT_PUBLIC_DOCTOR_NAME
        value: Dr. Anika Rao
